name: Deploy Scope Guard

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest
    steps:
      - name: Validate single deploy scope
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const scopes = {
              api: [
                "api/",
                "crawlers/",
                "models/",
                "crawler_logging/",
                "main.py",
                "pyproject.toml",
                "uv.lock",
                "railway.toml",
              ],
              web: ["web/"],
              db: ["supabase/"],
            };

            const touched = { api: false, web: false, db: false };
            for (const file of files) {
              const path = file.filename;
              for (const [scope, prefixes] of Object.entries(scopes)) {
                if (prefixes.some((p) => path === p || path.startsWith(p))) {
                  touched[scope] = true;
                }
              }
            }

            const activeScopes = Object.entries(touched)
              .filter(([, v]) => v)
              .map(([k]) => k);
            const labels = context.payload.pull_request.labels.map((l) => l.name);
            const bypassLabel = "mixed-deploy-ok";
            const bypassed = labels.includes(bypassLabel);

            core.notice(`Active deploy scopes: ${activeScopes.join(", ") || "none"}`);

            if (activeScopes.length > 1 && !bypassed) {
              core.setFailed(
                `This PR mixes deploy scopes (${activeScopes.join(", ")}). ` +
                `Split into separate PRs, or add label '${bypassLabel}' for an intentional mixed deploy.`
              );
            }
